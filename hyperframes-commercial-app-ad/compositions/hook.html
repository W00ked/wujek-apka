         class="clip hook-image-warmth"
         data-start="0"
         data-duration="4.2"
         data-track-index="2"></div>

    <div id="hook-bottom-panel"
         class="clip hook-bottom-panel"

         data-duration="4.2"

          data-duration="4.2"

    <style>
      #hook-root {

        --card: #ffffff;
        --text: #111827;
        --muted: #737b8a;
        --line: #e2e6eb;
        --green: #4b9d6c;
        --green-dark: #2b724f;
        --red: #ee001b;
        --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #111827;
        font-family: var(--font);
      }
      #hook-root * { box-sizing: border-box; }

      #hook-food-image {

      #hook-bottom-panel {

        width: 940px;
        color: var(--text);
        font-size: 61px;
        line-height: 1.06;
        font-weight: 760;
        letter-spacing: -2px;
      }
      #hook-main-line { top: 1336px; }
      #hook-main-line-2 { top: 1405px; color: var(--red); }
      #hook-subcopy {
        left: 72px;
        top: 1518px;

        color: #4b5563;
        font-size: 36px;

        text-align: center;

        line-height: 1;
        font-weight: 860;
        letter-spacing: -1px;
      }
      #hook-scan-caption {

        width: 178px;
        color: #6b7280;
        text-align: center;
        font-size: 26px;
        line-height: 1;

        top: 0;
        width: 160px;
        height: 1920px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
        transform: skewX(-16deg);
        opacity: 0;
      }

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo("#hook-food-image", { scale: 1.10, x: -42, y: -18 }, { scale: 1.22, x: 30, y: -46, duration: 4.2, ease: "power1.inOut" }, 0);
      tl.fromTo("#hook-bottom-panel", { y: 220, opacity: 0 }, { y: 0, opacity: 1, duration: 0.72, ease: "power3.out" }, 0.42);
      tl.fromTo("#hook-mini-pill", { opacity: 0, y: 26, scale: 0.94 }, { opacity: 1, y: 0, scale: 1, duration: 0.42, ease: "back.out(1.7)" }, 0.76);
      tl.fromTo("#hook-dish-name", { opacity: 0, y: 42 }, { opacity: 1, y: 0, duration: 0.58, ease: "power3.out" }, 0.92);
      tl.fromTo(["#hook-main-line", "#hook-main-line-2"], { opacity: 0, y: 34 }, { opacity: 1, y: 0, duration: 0.46, stagger: 0.15, ease: "power3.out" }, 1.40);
      tl.fromTo("#hook-subcopy", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.44, ease: "power3.out" }, 1.92);
      tl.fromTo(["#hook-scan-card", "#hook-scan-value", "#hook-scan-caption"], { opacity: 0, scale: 0.82, y: 18 }, { opacity: 1, scale: 1, y: 0, duration: 0.44, stagger: 0.04, ease: "back.out(1.6)" }, 2.06);
      tl.to("#hook-scan-card", { scale: 1.045, duration: 0.20, ease: "power2.out", transformOrigin: "center center" }, 2.70);
      tl.to("#hook-scan-card", { scale: 1, duration: 0.26, ease: "power2.out", transformOrigin: "center center" }, 2.90);
      tl.to("#hook-light-sweep", { opacity: 1, x: 1560, duration: 0.86, ease: "power2.inOut" }, 2.65);
      tl.to("#hook-light-sweep", { opacity: 0, duration: 0.18, ease: "power2.out" }, 3.46);
      tl.set({}, {}, 4.2);
      window.__timelines["ad-hook"] = tl;
    </script>
  </div>
</template>
