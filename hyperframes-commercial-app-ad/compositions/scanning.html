      tl.to(["#scan-phone-shadow", "#scan-phone-frame", "#scan-screen"], { opacity: 1, y: 0, scale: 1, duration: 0.54, stagger: 0.03, ease: "power3.out" }, 0);
      tl.fromTo("#scan-dim", { opacity: 0 }, { opacity: 1, duration: 0.42, ease: "power2.out" }, 0.34);
      tl.fromTo(["#scan-step-pill", "#scan-headline", "#scan-subline"], { opacity: 0, y: 28 }, { opacity: 1, y: 0, duration: 0.42, stagger: 0.08, ease: "power3.out" }, 0.42);

      tl.fromTo("#scan-orb-text", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.36, ease: "power3.out" }, 1.04);
      tl.fromTo(["#scan-ring-a", "#scan-ring-b"], { opacity: 0, scale: 0.68 }, { opacity: 1, scale: 1.18, duration: 1.25, stagger: 0.22, ease: "power2.out" }, 1.05);

      tl.to("#scan-orb", { scale: 1.055, duration: 0.22, ease: "power2.out", transformOrigin: "center center" }, 3.08);
