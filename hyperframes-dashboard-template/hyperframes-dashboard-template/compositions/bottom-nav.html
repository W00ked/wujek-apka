    <script>

      const tl = gsap.timeline({ paused: true });

      tl.fromTo("#nav-bg",

        { opacity: 1, y: 0, duration: 0.50, ease: "power3.out" },
        0
      );
      tl.fromTo(["#nav-home-icon", "#nav-home-label", "#nav-journal-icon", "#nav-journal-label", "#nav-index-icon", "#nav-index-label", "#nav-trends-icon", "#nav-trends-label"],

        0.12
      );
      tl.fromTo(["#nav-plus-ring", "#nav-plus-circle"],
        { opacity: 0, scale: 0.45, y: 28 },
        { opacity: 1, scale: 1, y: 0, duration: 0.54, stagger: 0.03, ease: "back.out(1.7)" },
        0.18
      );
      tl.fromTo("#nav-plus-symbol",
        { opacity: 0, scale: 0.45, rotate: -45 },
        { opacity: 1, scale: 1, rotate: 0, duration: 0.54, ease: "back.out(1.7)" },
        0.26

      tl.to("#nav-plus-circle", { scale: 1.06, duration: 0.18, ease: "power2.out", transformOrigin: "center center" }, 1.12);
      tl.to("#nav-plus-symbol", { scale: 1.06, duration: 0.18, ease: "power2.out", transformOrigin: "center center" }, 1.12);
      tl.to("#nav-plus-circle", { scale: 1, duration: 0.28, ease: "power2.out", transformOrigin: "center center" }, 1.30);

      window.__timelines["dashboard-bottom-nav"] = tl;
